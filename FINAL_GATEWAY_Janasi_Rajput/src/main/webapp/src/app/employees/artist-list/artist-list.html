<h3>All Employees</h3>
<table border="1" cellpadding="5" cellspacing="0" style="width: 100%; border-collapse: collapse;">
  <thead>
    <tr style="background-color: #f2f2f2;">
      <th>ID</th>
      <th>Name</th>
    </tr>
  </thead>
  <tbody>
    @for (artist of artists; track artist.id) {
      <tr>
        <td>{{ artist.id }}</td>
        <td>{{ artist.name }}</td>
      </tr>
    }
  </tbody>
</table>
