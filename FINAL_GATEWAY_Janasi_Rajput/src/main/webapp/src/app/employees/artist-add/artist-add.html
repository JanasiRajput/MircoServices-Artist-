<h3>Add Employee</h3>
<form (ngSubmit)="addArtist()" #artistForm="ngForm" style="display: flex; flex-direction: column; width: 300px; gap: 1rem;">
  <div>
    <label for="name">Employee Name:</label>
    <input type="text" id="name" name="name" [(ngModel)]="artist.name" required style="width: 100%; padding: 0.5rem;" />
  </div>
  <button type="submit" [disabled]="!artistForm.form.valid" style="padding: 0.5rem; background-color: #333; color: white; border: none; cursor: pointer;">Add Employee</button>
</form>
