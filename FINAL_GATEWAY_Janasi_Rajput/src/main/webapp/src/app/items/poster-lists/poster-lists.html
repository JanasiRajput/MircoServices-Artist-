<h3>All Items</h3>
<table border="1" cellpadding="5" cellspacing="0" style="width: 100%; border-collapse: collapse;">
  <thead>
    <tr style="background-color: #f2f2f2;">
      <th>ID</th>
      <th>Name</th>
      <th>Price</th>
      <th>Quantity</th>
      <th>Employee Name</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody>
    @for (item of items; track item.id) {
      <tr>
        <td>{{ item.id }}</td>
        <td>{{ item.name }}</td>
        <td>{{ item.price }}</td>
        <td>{{ item.quantity }}</td>
        <td>{{ item.employeeName }}</td>
        <td>
          <button (click)="deleteItem(item.id)" style="margin-right: 0.5rem; background-color: #f44336; color: white; border: none; padding: 0.25rem 0.5rem; cursor: pointer;">Delete</button>
          
          <ng-container *ngIf="item.quantity > 0; else soldOut">
            <button (click)="purchaseItem(item.id)" style="background-color: #4CAF50; color: white; border: none; padding: 0.25rem 0.5rem; cursor: pointer;">Purchase</button>
          </ng-container>
          <ng-template #soldOut>
            <span style="color: red; font-weight: bold; margin-left: 0.5rem;">SOLD OUT</span>
          </ng-template>
        </td>
      </tr>
    }
  </tbody>
</table>
